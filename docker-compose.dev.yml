services:
  web:
    build:
      context: .
      dockerfile: dockerfile_build/Dockerfile
      args:
        NODE_ENV: development
    image: shudan-toko-maker-dev
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./shudan-toko-maker:/app:cached
      - node_modules:/app/node_modules
    working_dir: /app
    stdin_open: true
    tty: true

volumes:
  node_modules:

