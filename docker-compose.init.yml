services:
  init:
    build:
      context: .
      dockerfile: dockerfile_build/Dockerfile
    image: shudan-toko-maker-init
    volumes:
      - ./shudan-toko-maker:/app:rw
      - node_modules:/app/node_modules
    working_dir: /app
    command: ["sh", "-c", "npm ci || npm i; chown -R 1000:1000 /app"]
    environment:
      - NODE_ENV=development

volumes:
  node_modules:

